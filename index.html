<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="src/output.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<section>
  <div class="mx-auto mt-10 relative overflow-hidden">
    <img src="src/banner.png" alt="logo">
  </div>
  <div class="max-w-2xl mx-auto absolute top-[30%] left-[20%] transform -translate-x-[20%] -translate-y-[30%] p-10">

    <h1 class="text-white text-[45px] font-bold mb-6">UP TO $60 OFF POLARISED <br> SUNGLASSES</h1>
    <button class="text-[14px] font-semibold px-10 py-3 bg-white text-black hover:bg-black hover:text-white">SHOP NOW</button>
  </div>
</section>
<section class="mx-auto">
  <h1 class="text-[35px] text-center font-semibold mb-10 mt-28 ">Shop By <span class="text-[35px] font-bold">Shape</span></h1>
  <div class=" text-[16px] font-semibold main flex justify-center items-center gap-5 mt-10">
    <div>
    <img src="src/Image.png" alt="1">
    <h1 class="text-center mt-2 font-semibold">SQUARE</h1>
  </div>
  <div>
    <img src="src/Image.png" alt="2">
    <h1 class="text-center mt-2 font-semibold">AVIATOR</h1>
  </div>
  <div>
    <img src="src/Image.png" alt="3">
    <h1 class="text-center mt-2 font-semibold">RECTANGULAR</h1>
  </div>
  <div>
    <img src="src/Image.png" alt="4">
    <h1 class="text-center mt-2 font-semibold">ROUNDED</h1>
  </div>
  <div>
    <img src="src/Image.png" alt="5">
    <h1 class="text-center mt-2 font-semibold">OVAL</h1>
  </div>
  <div>
    <img src="src/Image.png" alt="6">
    <h1 class="text-center mt-2 font-semibold">GEOMETRIC</h1>
  </div>
  </div>
</section>
<section class="mx-auto max-w-7xl mt-28">
  <div class="flex justify-center gap-8 items-center">
    <div class="h-125 w-208 relative">
      <img src="src/I-1.png" alt="1">
      <div class="max-w-2xl mx-auto absolute top-[90%] left-[10%] transform -translate-x-[10%] -translate-y-[90%] p-10">
      <h3 class="text-white text-[14px] font-semibold mb-2">COLLECTION</h3>
      <h1 class="text-white text-[20px] font-bold mb-7">SUNGLASSES MEN'S</h1>
      <button class="relative text-[14px] font-semibold text-white after:content-[''] after:absolute after:left-0 after:-bottom-1 after:h-0.5 after:w-1/2 after:bg-white hover:after:w-full after:transition-all after:duration-300">
        SHOP NOW
      </button>
      </div>
    </div>
    <div class="h-125 w-208 relative">
      <img src="src/I-2.png" alt="2">
      <div class="max-w-2xl mx-auto absolute top-[90%] left-[10%] transform -translate-x-[10%] -translate-y-[90%] p-10">
      <h3 class="text-white text-[14px] font-semibold mb-2">COLLECTION</h3>
      <h1 class="text-white text-[20px] font-bold mb-7">SUNGLASSES WOMEN'S</h1>
      <button class="relative text-[14px] font-semibold text-white after:content-[''] after:absolute after:left-0 after:-bottom-1 after:h-0.5 after:w-1/2 after:bg-white hover:after:w-full after:transition-all after:duration-300">
        SHOP NOW
      </button>
      </div>
    </div>
  </div>
</section>
</body>
</html>
